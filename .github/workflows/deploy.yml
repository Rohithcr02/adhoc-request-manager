name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate index.html for GitHub Pages
        run: |
          node -e "
          const fs = require('fs');
          const assetsDir = 'dist/client/assets';
          const files = fs.readdirSync(assetsDir);
          const css = files.find(f => f.endsWith('.css'));
          const jsFiles = files.filter(f => f.endsWith('.js'));
          const base = '/adhoc-request-manager/';
          const html = \`<!DOCTYPE html>
          <html lang='en'>
          <head>
            <meta charset='utf-8' />
            <meta name='viewport' content='width=device-width, initial-scale=1' />
            <title>UW SoM · Data Request Manager</title>
            <meta name='description' content='AI-powered ad-hoc data request manager for UW School of Medicine' />
            \${css ? \`<link rel='stylesheet' href='\${base}assets/\${css}' />\` : ''}
          </head>
          <body>
            \${jsFiles.map(js => \`<script type='module' src='\${base}assets/\${js}'></script>\`).join('\n    ')}
          </body>
          </html>\`;
          fs.writeFileSync('dist/client/index.html', html);
          fs.writeFileSync('dist/client/404.html', html);
          console.log('Generated index.html');
          console.log('CSS:', css);
          console.log('JS files:', jsFiles);
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
